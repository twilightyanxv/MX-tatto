<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到 | MX Tattoo Pen</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .error-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .error-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .error-desc {
            color: #999;
            font-size: 1.05rem;
            max-width: 480px;
            margin: 0 auto 2rem;
        }
        @media (max-width: 575.98px) {
            .error-code { font-size: 5rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-brush me-2"></i>MX Tattoo Pen
            </a>
        </div>
    </nav>

    <section class="error-section">
        <div class="container">
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
            <a href="/" class="btn btn-primary btn-lg px-4 py-3">
                <i class="bi bi-house-door me-2"></i>Back to Home
            </a>
        </div>
    </section>

    <footer class="footer-section py-4">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 MX Tattoo Pen. All Rights Reserved.</p>
        </div>
    </footer>
</body>
</html>
